<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKM Universal Finder</title>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
    body{font-family:Arial;margin:20px;background:#f4f6f8;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    .card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);max-width:450px;width:100%}
    h2{text-align:center;margin-top:0}
    select,input,button{width:100%;margin-top:10px;padding:10px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
    button{background:#007BFF;color:white;border:none;cursor:pointer;font-weight:bold}
    button:hover{background:#0056b3}
    table{width:100%;margin-top:20px;border-collapse:collapse;font-size:0.9em}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    .bar{margin-top:15px;height:20px;background:#ddd;border-radius:10px;overflow:hidden}
    .fill{height:100%;background:#28a745;width:0%;transition:width 0.3s}
    .result{margin-top:10px;padding:15px;background:#f0f4f8;border-radius:8px;border-left:5px solid #007BFF}
    #gps-info {font-size: 0.85em; line-height:1.4; color: #333; margin-top: 10px; padding:10px; background:#fff; border:1px solid #ddd; border-radius:6px}
    .status-ok {color: #28a745; font-weight:bold}
    .status-warn {color: #856404; background:#fff3cd; padding:2px 5px; border-radius:3px}
</style>
</head>
<body>

<div class="card">
    <h2>Zuständigkeit & BKM</h2>
    <p style="font-size:0.8em; color:#666">Wähle eine Autobahn für Details oder nutze GPS für alle Straßen.</p>
    
    <select id="autobahn" onchange="zeigeListe(); updateRichtung();">
        <option value="">-- Autobahn wählen --</option>
        <option value="A1">A1</option>
        <option value="A3">A3</option>
        <option value="A44">A44</option>
        <option value="A46">A46</option>
        <option value="A57">A57</option>
        <option value="A59">A59</option>
        <option value="A535">A535</option>
        <option value="A542">A542</option>
    </select>

    <input id="km" placeholder="Kilometer (z.B. 102,5)">
    <button onclick="starteGPS()" id="gps-btn">📡 GPS BKM-Erfassung starten</button>
    <div id="gps-info">Warte auf Start...</div>
    
    <div class="result">
        <p><strong>Bereich:</strong> <span id="b">-</span></p>
        <p><strong>Gemeinde:</strong> <span id="g">-</span></p>
        <p><strong>Meisterei:</strong> <span id="m">-</span></p>
        <div class="bar"><div id="progress" class="fill"></div></div>
    </div>

    <table>
        <thead><tr><th>Typ</th><th>Name</th><th>Km</th></tr></thead>
        <tbody id="liste"></tbody>
    </table>
</div>

<script>
// Datenobjekte (Grenzwerte, Listen, Meistereien wie gehabt)
const grenzen={A1:[363.315,381.658],A3:[101.2,122.819],A44:[1.215,17.599],A46:[70.815,114.763],A57:[88.5,100.912],A59:[0.578,14.467],A535:[0.262,12.811],A542:[4.055,8.754]};
const listen={
    A1:[["AS","W.-Langerfeld","365,700"],["AS","W.-Ronsdorf","373,300"],["AS","RS-Lennep","376,800"],["AS","Remscheid","379,100"]],
    A3:[["AK","Hilden","108,700"],["AS","Solingen","117,400"],["AK","Langenfeld","118,400"]],
    A46:[["AS","NE-Uedesheim","72,300"],["AS","D.-Bilk","76,300"],["AS","D.-Wersten","78,200"],["AK","Hilden","87,000"],["AS","W.-Cronenberg","98,400"],["Kreuz","Sonnborn","99,500"]]
    // ... weitere Daten hier ergänzen
};
const gemeinden={
    A46:[{from:70.815,to:74.919,name:"Neuss"},{from:74.919,to:85.416,name:"Düsseldorf"},{from:85.416,to:94.706,name:"Haan"},{from:94.706,to:114.763,name:"Wuppertal"}]
    // ... weitere Daten hier ergänzen
};
const meistereien={
    A46:[{from:70.815,to:80.770,name:"AM Kaarst"},{from:80.770,to:88.340,name:"AM Leverkusen"},{from:88.340,to:114.763,name:"AM Remscheid"}]
    // ... weitere Daten hier ergänzen
};

let strassenDaten = null;
let gpsWatchId = null;

// Laden der JSON
fetch('Abschnitt.json')
    .then(res => res.json())
    .then(data => { strassenDaten = data; document.getElementById("gps-info").innerText = "Kartendaten geladen. Bereit."; })
    .catch(err => { document.getElementById("gps-info").innerText = "Fehler: Abschnitt.json nicht gefunden!"; });

function starteGPS() {
    const info = document.getElementById("gps-info");
    const btn = document.getElementById("gps-btn");
    if (gpsWatchId) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
        btn.innerText = "📡 GPS BKM-Erfassung starten";
        btn.style.background = "#007BFF";
        info.innerText = "GPS gestoppt.";
        return;
    }
    btn.innerText = "⏹️ GPS stoppen";
    btn.style.background = "#dc3545";
    gpsWatchId = navigator.geolocation.watchPosition(pos => {
        berechneBKM(pos.coords.latitude, pos.coords.longitude);
    }, err => { info.innerText = "GPS-Fehler: " + err.message; }, { enableHighAccuracy: true });
}

function berechneBKM(lat, lon) {
    if (!strassenDaten) return;
    try {
        const aktuellerPunkt = turf.point([lon, lat]);
        const snapped = turf.nearestPointOnLine(strassenDaten, aktuellerPunkt, {units: 'kilometers'});
        const distanzMeter = Math.round(snapped.properties.dist * 1000);

        // Basis-Infos aus JSON extrahieren
        const p = snapped.properties;
        const index = p.index;
        const featProps = strassenDaten.features[index].properties;
        
        const strKl = String(featProps.STRKL || "").trim();
        const strNr = String(featProps.STRNR || "").trim();
        const erkannteStrasse = strKl + strNr; // z.B. "A46" oder "L11"

        // BKM-Berechnung
        const statAnf = parseFloat(featProps.STATANF) || 0;
        const meterAufAbschnitt = (p.location || 0) * 1000;
        const aktuellerBKM = (statAnf + meterAufAbschnitt) / 1000;

        // UI: Kilometer immer aktualisieren
        document.getElementById("km").value = aktuellerBKM.toFixed(3).replace('.', ',');
        
        let infoText = `📍 <b>${erkannteStrasse}</b> | BKM: <b>${aktuellerBKM.toFixed(3)}</b><br>Abweichung: ${distanzMeter}m`;
        
        // Prüfen, ob diese Straße in unserer "Spezial-Datenbank" (Dropdown) ist
        const select = document.getElementById("autobahn");
        const istInListe = Array.from(select.options).some(opt => opt.value === erkannteStrasse);

        if (istInListe && distanzMeter < 500) {
            select.value = erkannteStrasse;
            zeigeListe(); // Anschlussstellen & Zuständigkeit laden
            updateZuständigkeit();
            infoText = `<span class="status-ok">✅ Auf ${erkannteStrasse}</span><br>` + infoText;
        } else {
            // Für Landstraßen oder nicht hinterlegte Autobahnen
            infoText = `<span class="status-warn">ℹ️ Straße außerhalb Datenbank</span><br>` + infoText;
            document.getElementById("g").innerText = "-";
            document.getElementById("m").innerText = "-";
            document.getElementById("b").innerText = "Keine Bereichsdaten";
            document.getElementById("progress").style.width = "0%";
            document.getElementById("liste").innerHTML = "<tr><td colspan='3'>Keine AS-Liste für diese Straße</td></tr>";
        }

        document.getElementById("gps-info").innerHTML = infoText;

    } catch (e) { console.error(e); }
}

// Hilfsfunktionen (zeigeListe, updateZuständigkeit etc. bleiben logisch gleich)
function zeigeListe(){
    let a = document.getElementById("autobahn").value;
    let tbody = document.getElementById("liste");
    tbody.innerHTML = "";
    if(!grenzen[a]) return;
    document.getElementById("b").innerText = grenzen[a][0] + " - " + grenzen[a][1];
    if(listen[a]) {
        listen[a].forEach(e => {
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td>`;
            tbody.appendChild(tr);
        });
    }
}

function updateZuständigkeit() {
    let a = document.getElementById("autobahn").value;
    let km = parseFloat(document.getElementById("km").value.replace(',','.'));
    if(isNaN(km) || !gemeinden[a]) return;
    
    let gem = "-", mei = "-";
    gemeinden[a].forEach(g => { if(km >= g.from && km <= g.to) gem = g.name; });
    meistereien[a].forEach(m => { if(km >= m.from && km <= m.to) mei = m.name; });
    
    document.getElementById("g").innerText = gem;
    document.getElementById("m").innerText = mei;
    
    // Progress Bar
    let min = grenzen[a][0], max = grenzen[a][1];
    let perc = ((km - min) / (max - min)) * 100;
    document.getElementById("progress").style.width = Math.max(0, Math.min(100, perc)) + "%";
}
</script>
</body>
</html>
