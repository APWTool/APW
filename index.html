<!DOCTYPE html>
<html>
<head>
    <title>BKM Tracker - NWSIB Integration</title>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #ausgabe { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 10px; line-height: 1.6; }
        .bkm-wert { font-size: 1.5em; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>
    <h1>Mein Autobahn-Tool (Live BKM)</h1>
    <div id="ausgabe">Warte auf GPS und Daten...</div>

    <script>
        let strassenDaten = null;

        // 1. Deine konvertierte Datei laden (Abschnitt.json)
        fetch('Abschnitt.json')
            .then(response => response.json())
            .then(data => {
                strassenDaten = data;
                console.log("NWSIB Daten erfolgreich geladen!");
                starteGPS(); 
            })
            .catch(err => {
                document.getElementById('ausgabe').innerHTML = "Fehler beim Laden der Abschnitt.json!";
                console.error(err);
            });

        function starteGPS() {
            if (navigator.geolocation) {
                // watchPosition sorgt für kontinuierliche Updates während der Fahrt
                navigator.geolocation.watchPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    berechneBKM(lat, lon);
                }, error => {
                    console.error("GPS Fehler:", error);
                }, {
                    enableHighAccuracy: false // Wichtig für Autobahngeschwindigkeiten // SPÄTER AUF TRUE SETZEN 
                });
            }
        }

function berechneBKM(lat, lon) {
    if (!strassenDaten) return;

    try {
        const aktuellerPunkt = turf.point([lon, lat]);
        const snapped = turf.nearestPointOnLine(strassenDaten, aktuellerPunkt);
        
        // SICHERHEITS-CHECK: 
        // Turf legt die Attribute manchmal in snapped.properties ab, 
        // aber die Original-Daten liegen IMMER im Quell-Feature.
        const index = snapped.properties.index;
        const originalFeature = strassenDaten.features[index];
        const p = originalFeature.properties; // Hier liegen STRKL, STRNR definitiv!

        // Werte auslesen
        const strKl  = p.STRKL || "";
        const strNr  = p.STRNR || "";
        const absNr  = p.ABSNR || "Unbekannt";
        const strBez = p.STRBEZ || "-";
        const statAnf = parseFloat(p.STATANF) || 0;

        // BKM Berechnung
        // snapped.properties.location ist die Distanz vom Anfang der Linie zum Snap-Punkt
        const meterAufAbschnitt = snapped.properties.location; 
        const gesamtMeter = statAnf + meterAufAbschnitt;
        const aktuellerBKM = (gesamtMeter / 1000).toFixed(3);

        // In HTML anzeigen
        document.getElementById('ausgabe').innerHTML = `
            <div style="border-left: 5px solid #0056b3; padding-left: 15px; text-align: left;">
                <strong style="font-size: 1.2em;">Straße: ${strKl}${strNr}</strong><br>
                <span>Abschnitt: ${absNr} (${strBez})</span>
                <hr style="border: 0; border-top: 1px solid #ccc;">
                <span style="font-size: 0.9em; color: #666;">Aktuelle Position:</span><br>
                <span style="font-size: 2.2em; font-weight: bold; color: #0056b3;">
                    KM ${aktuellerBKM.replace('.', ',')}
                </span>
            </div>
        `;

        // Debugging für dich:
        console.log("Erkannt:", strKl, strNr, "an Position", aktuellerBKM);
        
    } catch (e) {
        console.error("Fehler:", e);
        document.getElementById('ausgabe').innerHTML = "Berechnungsfehler: " + e.message;
    }
}
    </script>
</body>
</html>
