<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKM Finder - A1 Edition</title>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
    body{font-family:Arial,sans-serif;margin:20px;background:#f4f6f8;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    .card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);max-width:500px;width:100%}
    h2{text-align:center;margin-top:0;color:#333}
    select,input,button{width:100%;margin-top:10px;padding:12px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;font-size:1em}
    button{background:#007BFF;color:white;border:none;cursor:pointer;font-weight:bold}
    button:hover{background:#0056b3}
    table{width:100%;margin-top:20px;border-collapse:collapse;font-size:0.85em}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    .bar{margin-top:15px;height:18px;background:#ddd;border-radius:9px;overflow:hidden}
    .fill{height:100%;background:#28a745;width:0%;transition:width 0.3s}
    .result{margin-top:10px;padding:15px;background:#f0f4f8;border-radius:8px;border-left:5px solid #007BFF}
    #gps-info {font-size: 0.9em; line-height:1.4; margin-top: 10px; padding:12px; background:#fff; border:1px solid #ddd; border-radius:6px}
    .status-ok {color: #28a745; font-weight:bold; display:block; margin-bottom:5px}
    .status-warn {color: #856404; font-weight:bold}
</style>
</head>
<body>

<div class="card">
    <h2>Zuständigkeit & BKM</h2>
    
    <select id="autobahn" onchange="zeigeListe(); updateZuständigkeit();">
        <option value="">-- Autobahn wählen --</option>
        <option value="A1">A1</option><option value="A3">A3</option>
        <option value="A44">A44</option><option value="A46">A46</option>
        <option value="A57">A57</option><option value="A59">A59</option>
        <option value="A535">A535</option><option value="A542">A542</option>
    </select>

    <input id="km" placeholder="Kilometer (z.B. 102,5)" oninput="updateZuständigkeit()">
    <button onclick="starteGPS()" id="gps-btn">📡 GPS Live-Erfassung</button>
    <div id="gps-info">Initialisiere Daten...</div>
    
    <div class="result">
        <p><strong>Bereich:</strong> <span id="b">-</span></p>
        <p><strong>Gemeinde:</strong> <span id="g">-</span></p>
        <p><strong>Meisterei:</strong> <span id="m">-</span></p>
        <div class="bar"><div id="progress" class="fill"></div></div>
    </div>

    <table>
        <thead><tr><th>Typ</th><th>Name</th><th>Km</th></tr></thead>
        <tbody id="liste"></tbody>
    </table>
</div>

<script>
// --- DEINE LISTEN (Unverändert) ---
const grenzen={A1:[363.315,381.658],A3:[101.2,122.819],A44:[1.215,17.599],A46:[70.815,114.763],A57:[88.5,100.912],A59:[0.578,14.467],A535:[0.262,12.811],A542:[4.055,8.754]};
const listen={
    A1:[["AS","W.-Langerfeld","365,700"],["PP","Kucksiepen","367,900"],["PP","Ehrenberg","368,200"],["AS","W.-Ronsdorf","373,300"],["AS","RS-Lennep","376,800"],["AS","Remscheid","379,100"]],
    A46:[["AK","Neuss-Süd","70,800"],["AS","NE-Uedesheim","72,300"],["AS","D.-Bilk","76,300"],["AS","D.-Wersten","78,200"],["AS","D.-Holthausen","80,000"],["AS","D.-Eller","81,200"],["AK","Düsseldorf-Süd","82,000"],["AS","Erkrath","85,000"],["AK","Hilden","87,000"],["AS","Hilden","87,400"],["AS","Haan-West","89,400"],["AS","Haan-Ost","94,200"],["AS","W.-Cronenberg","98,400"],["Kreuz","Sonnborn","99,500"],["AS","W.-Varresbeck","101,600"],["AS","W.-Katernberg","103,900"],["AS","W.-Elberfeld","105,700"],["AS","W.-Barmen","107,800"],["AS","W.-Wichlinghausen","110,000"],["AS","W.-Oberbarmen","113,900"]]
};
const gemeinden={
    A1:[{from:363.315,to:365.711,name:"Schwelm"},{from:365.711,to:373.815,name:"Wuppertal"},{from:373.815,to:381.646,name:"Remscheid"}]
};

let datenA = [], datenB = [], datenL = [];
let datenGeladen = false;
let gpsWatchId = null;

// Lade-Logik mit Flattening
Promise.all([
    fetch('Abschnitt.json').then(res => res.json()),
    fetch('AbschnittBAB.json').then(res => res.json())
]).then(([dataLand, dataBAB]) => {
    [...dataLand.features, ...dataBAB.features].forEach(f => {
        try {
            let kl = String(f.properties?.STRKL || "").trim().toUpperCase();
            if (f.geometry) {
                let flattened = turf.flatten(f);
                flattened.features.forEach(sub => {
                    if (kl === "A") datenA.push(sub);
                    else if (kl === "B") datenB.push(sub);
                    else datenL.push(sub);
                });
            }
        } catch (e) {}
    });
    datenGeladen = true;
    document.getElementById("gps-info").innerText = `Bereit (${datenA.length} A-Segmente)`;
}).catch(err => { console.error(err); });

function findeNaechsteLinie(arr, pt) {
    let minDist = Infinity, best = null;
    arr.forEach(f => {
        try {
            let p = turf.nearestPointOnLine(f, pt, {units: 'kilometers'});
            if (p.properties.dist < minDist) {
                minDist = p.properties.dist;
                best = p;
                best.properties.originalFeature = f;
            }
        } catch (e) {}
    });
    return best;
}

function starteGPS() {
    const btn = document.getElementById("gps-btn");
    if (gpsWatchId) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
        btn.innerText = "📡 GPS Live-Erfassung starten";
        btn.style.background = "#007BFF";
        return;
    }
    btn.innerText = "⏹️ GPS stoppen";
    btn.style.background = "#dc3545";
    gpsWatchId = navigator.geolocation.watchPosition(pos => {
        const pt = turf.point([pos.coords.longitude, pos.coords.latitude]);
        let nA = findeNaechsteLinie(datenA, pt);
        let nB = findeNaechsteLinie(datenB, pt);
        let nL = findeNaechsteLinie(datenL, pt);

        let sel = null;
        // Autobahn-Vorrang bis 2.5km wegen ungenauer Daten
        if (nA && nA.properties.dist <= 2.5) sel = nA;
        else if (nB && nB.properties.dist <= 0.5) sel = nB;
        else {
            let dA = nA ? nA.properties.dist : Infinity;
            let dB = nB ? nB.properties.dist : Infinity;
            let dL = nL ? nL.properties.dist : Infinity;
            let m = Math.min(dA, dB, dL);
            sel = (m === dA) ? nA : (m === dB ? nB : nL);
        }

        if (sel) {
            const p = sel.properties.originalFeature.properties;
            const sName = (String(p.STRKL||"") + String(p.STRNR||"")).toUpperCase().replace(/\s/g,'');
            const dist = Math.round(sel.properties.dist * 1000);
            
            // Berechnung: STATANF ist in der JSON oft in Metern (z.B. 378400)
            let start = parseFloat(p.STATANF) || 0;
            // Falls STATANF kleiner als 1000 ist, ist es evtl. schon km. Wir prüfen das:
            let bkm = (start > 1000) ? (start + (sel.properties.location * 1000)) / 1000 : start + sel.properties.location;

            document.getElementById("km").value = bkm.toFixed(3).replace('.', ',');
            const select = document.getElementById("autobahn");
            if (Array.from(select.options).some(o => o.value === sName)) {
                select.value = sName;
                zeigeListe();
                updateZuständigkeit();
                document.getElementById("gps-info").innerHTML = `<span class="status-ok">✅ ${sName} erkannt</span>BKM: ${bkm.toFixed(3)} | Abweichung: ${dist}m`;
            } else {
                document.getElementById("gps-info").innerHTML = `<span class="status-warn">ℹ️ ${sName} (Nicht Fokus)</span><br>BKM: ${bkm.toFixed(3)} | Abweichung: ${dist}m`;
            }
        }
    }, null, { enableHighAccuracy: true });
}

function zeigeListe() {
    let a = document.getElementById("autobahn").value;
    let tbody = document.getElementById("liste");
    tbody.innerHTML = "";
    if(!grenzen[a]) return;
    document.getElementById("b").innerText = grenzen[a][0].toFixed(3).replace('.',',') + " - " + grenzen[a][1].toFixed(3).replace('.',',');
    if(listen[a]) {
        listen[a].forEach(e => {
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td>`;
            tbody.appendChild(tr);
        });
    }
}

function updateZuständigkeit() {
    let a = document.getElementById("autobahn").value, val = document.getElementById("km").value.replace(',','.');
    let km = parseFloat(val);
    if(isNaN(km) || !grenzen[a]) return;
    let gN = "-", mN = "-";
    if(gemeinden[a]) gemeinden[a].forEach(g => { if(km>=g.from && km<=g.to) gN=g.name; });
    document.getElementById("g").innerText = gN;
    let p = ((km - grenzen[a][0]) / (grenzen[a][1] - grenzen[a][0])) * 100;
    document.getElementById("progress").style.width = Math.max(0, Math.min(100, p)) + "%";
}

zeigeListe();
</script>
</body>
</html>
