<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autobahn Tool</title>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
body{font-family:Arial;margin:20px;background:#f4f6f8;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);max-width:450px;width:100%}
h2{text-align:center}

    
select,input,button{width:100%;margin-top:10px;padding:10px;border-radius:6px;border:1px solid #ccc}
button{background:#007BFF;color:white;border:none;cursor:pointer}
button:hover{background:#0056b3}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px}
th{background:#eee}
.bar{margin-top:15px;height:20px;background:#ddd;border-radius:10px;overflow:hidden}
.fill{height:100%;background:#007BFF;width:0%}
.result{margin-top:10px;padding:10px;background:#f0f4f8;border-radius:8px}
#gps-info {font-size: 0.8em; color: #666; margin-top: 5px;}
</style>
</head>
<body>

<div class="card">
<h2>Zuständigkeits und BKM Finder</h2>
<select id="autobahn" onchange="zeigeListe(); updateRichtung();">
<option value="A1">A1</option>
<option value="A3">A3</option>
<option value="A44">A44</option>
<option value="A46">A46</option>
<option value="A57">A57</option>
<option value="A59">A59</option>
<option value="A535">A535</option>
<option value="A542">A542</option>

</select>

<input id="km" placeholder="Kilometer eingeben">
<button onclick="starteGPS()">📡 GPS Position holen (Live BKM)</button>
<div id="gps-info">Lade Kartendaten...</div>
<button onclick="berechnen()">Berechnen</button>

<div class="result">
<p><strong>Bereich:</strong> <span id="b"></span></p>
<p><strong>Gemeinde:</strong> <span id="g"></span></p>
<p><strong>Meisterei:</strong> <span id="m"></span></p>
<p><strong>Adresse:</strong> <span id="m_address"></span></p>
<div class="bar"><div id="progress" class="fill"></div></div>
</div>

<table>
<thead><tr><th>Typ</th><th>Name</th><th>Km</th></tr></thead>
<tbody id="liste"></tbody>
</table>
</div>

<div class="card">
<h2>Weg-Zeit Rechner</h2>
<input id="start_km" placeholder="Start km">
<input id="speed" placeholder="km/h">
<select id="richtung"></select>
<input id="zeit" placeholder="Zeit (h)">
<button onclick="berechneWeg()">Berechnen</button>

<div class="result">
<p><strong>Ziel km:</strong> <span id="ziel_km"></span></p>
<p><strong>Nächste AS:</strong> <span id="next_as"></span></p>
</div>
</div>

<script>
//DATEN 
const grenzen={A1:[363.315,381.658],A3:[101.2,122.819],A44:[1.215,17.599],A46:[70.815,114.763],A57:[88.5,100.912],A59:[0.578,14.467],A535:[0.262,12.811],A542:[4.055,8.754]};

const listen={
A1:[["AS","W.-Langerfeld","365,700"],["PP","Kucksiepen","367,900"],["PP","Ehrenberg","368,200"],["AS","W.-Ronsdorf","373,300"],["AS","RS-Lennep","376,800"],["AS","Remscheid","379,100"]],
A3:[["PP","Stindertal","103,400"],["PP","Stinderhof","103,400"],["AK","Hilden","108,700"],["TuR","Heidi","113,100"],["AS","Solingen","117,400"],["AK","Langenfeld","118,400"],["PP","Reusrather Heide","121,600"]],
A44:[["AS","Heiligenhaus","1,200"],["AS","Hetterscheidt","6,000"],["Tunnel","Birth","7,090-7,930"],["AS","Velbert-Nord","8,400"],["AD","Velbert-Nord","9,500"],["AS","Langenberg","11,900"],["AS","E.-Kupferd.-Dilldorf","14,100"],["SA","E.-Kupferdreh","14,700"],["AS","E.-Überruhr","16,800"],["AS","E.-Heisingen","17,600"]],
A46:[["AK","Neuss-Süd","70,800"],["AS","NE-Uedesheim","72,300"],["AS","D.-Bilk","76,300"],["Tunnel","Universität","76,136-77,170"],["AS","D.-Wersten","78,200"],["Tunnel","Wersten","78,140-79,010"],["AS","D.-Holthausen","80,000"],["AS","D.-Eller","81,200"],["AK","Düsseldorf-Süd","82,000"],["AS","Erkrath","85,000"],["AK","Hilden","87,000"],["AS","Hilden","87,400"],["AS","Haan-West","89,400"],["PP","Höfgen","92,600"],["PP","Stropmütze","92,600"],["AS","Haan-Ost","94,200"],["AS","W.-Cronenberg","98,400"],["Kreuz","Sonnborn","99,500"],["AS","W.-Varresbeck","101,600"],["AS","W.-Katernberg","103,900"],["AS","W.-Elberfeld","105,700"],["AS","W.-Barmen","107,800"],["AS","W.-Wichlinghausen","110,000"],["PP","Sternenberg","110,900"],["AS","W.-Oberbarmen","113,900"]],
A57:[["AK","Neuss-Süd","90,300"],["TuR","Nievenheim","94,900"],["AS","Dormagen","99,400"]],
A59:[["AK","Düsseldorf Süd","0,578"],["AS","D.-Benrath","1,800"],["AS","D.-Garath","4,600"],["PP","Wolfhagen","8,000"],["AS","Richrath","9,000"],["PP","Berghausen","9,900"],["AS","Monheim","11,400"],["AK","Monheim-Süd","13,100"]],
A535:[["AD","Velbert-Nord","0,262"],["AS","Velbert","1,800"],["AS","Tönnisheide","4,500"],["AS","Wülfrath","6,600"],["Tunnel","Großer Busch","11,030-11,300"],["AS","W.-Dornap","11,700"]],
A542:[["AD","Monheim-Süd","4,055"],["AS","Reusrath","5,700"],["AS","Immigrath","8,000"],["AD","Langenfeld","8,754"]]
};

const gemeinden={
A1:[{from:363.315,to:365.711,name:"Schwelm"},{from:365.711,to:373.815,name:"Wuppertal"},{from:373.815,to:381.646,name:"Remscheid"}],
A3:[{from:101.2,to:102.996,name:"Düsseldorf"},{from:102.996,to:108.347,name:"Erkrath"},{from:108.347,to:112.770,name:"Hilden"},{from:112.770,to:114.266,name:"Solingen"},{from:114.264,to:122.819,name:"Langenfeld"}],
A44:[{from:1.215,to:4.096,name:"Heiligenhaus"},{from:4.096,to:4.907,name:"Wülfrath"},{from:4.907,to:5.466,name:"Velbert"},{from:5.466,to:5.607,name:"Heiligenhaus"},{from:5.607,to:12.754,name:"Velbert"},{from:12.754,to:17.599,name:"Essen"}],
A46:[{from:70.815,to:74.919,name:"Neuss"},{from:74.919,to:85.416,name:"Düsseldorf"},{from:85.416,to:94.706,name:"Haan"},{from:94.706,to:114.763,name:"Wuppertal"}],
A57:[{from:88.5,to:91.6,name:"Neuss"},{from:91.6,to:100.912,name:"Dormagen"}],
A59:[{from:0.578,to:7.714,name:"Düsseldorf"},{from:7.714,to:14.467,name:"Langenfeld"}],
A535:[{from:0.262,to:7.128,name:"Velbert"},{from:7.128,to:9.326,name:"Wülfrath"},{from:9.326,to:12.811,name:"Wuppertal"}],
A542:[{from:4.055,to:8.754,name:"Langenfeld"}]
};

const richtungen={
A1:["RF Köln (+)","RF Dortmund (-)"],
A3:["RF Köln (+)","RF Arnheim (-)"],
A44:["RF Kassel (+)","RF Aachen (-)"],
A46:["RF Brilon (+)","RF Heinsberg (-)"],
A57:["RF Köln (+)","RF Nijmegen (-)"],
A59:["RF Köln (+)","RF Dinslaken (-)"],
A535:["RF Wuppertal (+)","RF Velbert (-)"],
A542:["RF Langenfeld (+)","RF Monheim (-)"]
};

const meistereien={
A1:[{from:363.315,to:365.649,name:"AM Hagen",address:"In d. Krone 20, 58099 Hagen"},{from:365.649,to:381.646,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}],
A3:[{from:101.2,to:107.925,name:"AM Ratingen",address:"Brachter Str. 45A, 40882 Ratingen"},{from:107.925,to:122.819,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}],
A44:[{from:1.215,to:17.599,name:"AM Ratingen",address:"Brachter Str. 45A, 40882 Ratingen"}],
A46:[{from:70.815,to:80.770,name:"AM Kaarst",address:"Neersener Str. 9, 41564 Kaarst"},{from:80.770,to:88.340,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"},{from:88.340,to:114.763,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}],
A57:[{from:88.5,to:93.343,name:"AM Kaarst",address:"Neersener Str. 9, 41564 Kaarst"},{from:93.343,to:100.912,name:"AM Köln",address:"Dürener Str. 462, 50858 Köln"}],
A59:[{from:0.578,to:14.467,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}],
A535:[{from:0.262,to:12.811,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}],
A542:[{from:4.055,to:8.754,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}]
};

//NWSIB BKM DATENBESTAND
let strassenDaten = null;
let gpsWatchId = null;

fetch('Abschnitt.json')
    .then(response => response.json())
    .then(data => {
        strassenDaten = data;
        document.getElementById("gps-info").innerText = "Bereit.";
        console.log("NWSIB Daten erfolgreich geladen!");
    })
    .catch(err => {
        document.getElementById("gps-info").innerText = "Fehler beim Laden der Abschnitt.json!";
        console.error(err);
    });

//FUNKTIONEN

function zeigeListe(){
let a=document.getElementById("autobahn").value;
let tbody=document.getElementById("liste");
tbody.innerHTML="";


if(!grenzen[a]) return;

let min=grenzen[a][0];
let max=grenzen[a][1];
document.getElementById("b").innerText=min.toFixed(3).replace('.',',')+" - "+max.toFixed(3).replace('.',',');

listen[a].forEach(e=>{
let tr=document.createElement("tr");
tr.innerHTML=`<td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td>`;
tbody.appendChild(tr);
});

updateZuständigkeit();
}

function updateZuständigkeit() {
    let a=document.getElementById("autobahn").value;
    let km=parseFloat(document.getElementById("km").value.replace(',','.'));
    let gemeinde="-";
    let meister="-";
    let addr="-";
    
    if(!isNaN(km) && gemeinden[a]){
        gemeinden[a].forEach(gf=>{if(km>=gf.from && km<=gf.to) gemeinde=gf.name;});
        meistereien[a].forEach(mf=>{if(km>=mf.from && km<=mf.to){meister=mf.name; addr=mf.address;}});
    }
    document.getElementById("g").innerText=gemeinde;
    document.getElementById("m").innerText=meister;
    document.getElementById("m_address").innerText=addr;
}

function updateRichtung(){
let a=document.getElementById("autobahn").value;
let sel=document.getElementById("richtung");
sel.innerHTML="";
if(!richtungen[a]) return;
richtungen[a].forEach(r=>{
let option=document.createElement("option");
option.value=r;
option.textContent=r;
sel.appendChild(option);
});
}


    
function starteGPS() {
    const info = document.getElementById("gps-info");
    const btn = document.querySelector("button[onclick='starteGPS()']");
    const kmInput = document.getElementById("km");
    
    if (!strassenDaten) {
        info.innerText = "⏳ Kartendaten laden noch...";
        return;
    }
    if (!navigator.geolocation) {
        info.innerText = "❌ GPS nicht unterstützt";
        return;
    }

   
    if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
        info.innerText = "⏹️ GPS gestoppt.";
        btn.innerText = "📡 GPS Position holen (Live BKM)";
        btn.style.background = "#007BFF"; // Wieder blau
        kmInput.readOnly = false; // Manuelle Eingabe wieder erlauben
        return;
    }

    // GPS STARTEN
    info.innerText = "⏳ Suche Signal...";
    btn.innerText = "⏹️ GPS stoppen";
    btn.style.background = "#dc3545"; // Rot zur Warnung
    kmInput.readOnly = true; // Manuelle Eingabe sperren, während GPS läuft

    gpsWatchId = navigator.geolocation.watchPosition(position => {
        berechneBKM(position.coords.latitude, position.coords.longitude);
    }, error => {
        info.innerText = "❌ GPS Fehler: " + error.message;
        console.error("GPS Fehler:", error);
    }, {
        enableHighAccuracy: true
    });
}

function berechneBKM(lat, lon) {
    if (!strassenDaten) return;

    try {
        const aktuellerPunkt = turf.point([lon, lat]);
        // Suche den nächsten Punkt auf der Linie
        const snapped = turf.nearestPointOnLine(strassenDaten, aktuellerPunkt, {units: 'kilometers'});
        
        const distanzZurStrasse = snapped.properties.dist; // In Kilometern

        // 1. Prüfung: Bist du wirklich auf der Autobahn?
        // 0.05 km = 50 Meter Toleranz (Berücksichtigt GPS-Rauschen)
        if (distanzZurStrasse > 0.05) { 
            document.getElementById("gps-info").innerText = 
                `⚠️ Zu weit entfernt: ${Math.round(distanzZurStrasse * 1000)}m. (Brauche < 50m)`;
            return;
        }

        const index = snapped.properties.index;
        const p = strassenDaten.features[index].properties; 

        // 2. Einheiten-Korrektur:
        // Turf 'location' ist KM. statAnf ist meist Meter.
        const statAnf = parseFloat(p.STATANF) || 0;
        const meterAufAbschnitt = snapped.properties.location * 1000; // KM in Meter umrechnen!
        
        const gesamtMeter = statAnf + meterAufAbschnitt;
        const aktuellerBKM = (gesamtMeter / 1000);

        // Autobahn-Name zusammenbauen (z.B. "A" + "46")
        const strKl = (p.STRKL || "").trim(); 
        const strNr = (p.STRNR || "").trim();
        const erkannteAutobahn = strKl + strNr;

        const select = document.getElementById("autobahn");
        let existiert = Array.from(select.options).some(opt => opt.value === erkannteAutobahn);

        if (existiert) {
            select.value = erkannteAutobahn;
            document.getElementById("gps-info").innerText = 
                `✅ ${erkannteAutobahn} erkannt (Präzision: ${Math.round(distanzZurStrasse * 1000)}m)`;
            
            document.getElementById("km").value = aktuellerBKM.toFixed(3).replace('.', ',');
            
            // UI Update
            zeigeListe();
            updateRichtung();
            berechnen();
        } else {
            document.getElementById("gps-info").innerText = 
                `⚠️ ${erkannteAutobahn} nicht in Datenbank (KM ${aktuellerBKM.toFixed(3)})`;
        }

    } catch (e) {
        console.error("Berechnungsfehler:", e);
        document.getElementById("gps-info").innerText = "Fehler: " + e.message;
    }
}

    
function berechnen(){
updateZuständigkeit();
let km=parseFloat(document.getElementById("km").value.replace(',','.'));
if(isNaN(km)) return;
let a=document.getElementById("autobahn").value;
if(!grenzen[a]) return;
let min=grenzen[a][0];
let max=grenzen[a][1];
let percent=((km-min)/(max-min))*100;
document.getElementById("progress").style.width=Math.max(0,Math.min(100,percent))+"%";
}

function berechneWeg(){
let km=parseFloat(document.getElementById("start_km").value.replace(',','.'));
let speed=parseFloat(document.getElementById("speed").value);
let time=parseFloat(document.getElementById("zeit").value);
let dir=document.getElementById("richtung").value;
let a=document.getElementById("autobahn").value;
if(isNaN(km)||isNaN(speed)||isNaN(time))return;
let dist=speed*time;
let ziel=dir.includes("(+)")?km+dist:km-dist;

let next="-";
let bestDiff=Infinity;
if(listen[a]) {
    listen[a].forEach(e=>{
    if(e[0]!="AS") return;
    let val=parseFloat(e[2].replace(',','.'));
    if(dir.includes("(+)") && val>=ziel){let d=val-ziel;if(d<bestDiff){bestDiff=d; next=e[1];}}
    if(dir.includes("(-)") && val<=ziel){let d=ziel-val;if(d<bestDiff){bestDiff=d; next=e[1];}}
    });
}
document.getElementById("ziel_km").innerText=ziel.toFixed(3).replace('.',',');
document.getElementById("next_as").innerText=next;
}

zeigeListe();
updateRichtung();
</script>

</body>
</html>
