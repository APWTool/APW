<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autobahn Tool - Profi Version (GeoJSON)</title>
<script src="turf.min.js"></script>
<style>
/* Design-Fix: Einheitliche Proportionen und Box-Sizing */
body { font-family: Arial, sans-serif; margin: 20px; background: #f4f6f8; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); max-width: 450px; width: 100%; box-sizing: border-box; }
h2 { text-align: center; color: #333; margin-top: 0; }

/* WICHTIG: box-sizing: border-box sorgt dafür, dass 100% Breite exakt 100% bleiben */
select, input, button { 
    width: 100%; 
    margin-top: 10px; 
    padding: 12px; 
    border-radius: 6px; 
    border: 1px solid #ccc; 
    box-sizing: border-box; 
    font-size: 16px; 
    font-family: inherit;
}
button { background: #007BFF; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
button:hover { background: #0056b3; }
button.active { background: #dc3545; }

table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.9em; }
th, td { border: 1px solid #ccc; padding: 10px 8px; text-align: left; }
th { background: #eee; }
.bar { margin-top: 15px; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; }
.fill { height: 100%; background: #007BFF; width: 0%; transition: width 0.3s; }
.result { margin-top: 15px; padding: 15px; background: #f0f4f8; border-radius: 8px; border-left: 4px solid #007BFF; }
.result p { margin: 8px 0; }
#gps-info { font-size: 0.9em; background: #fff; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-top: 10px; line-height: 1.4; text-align: center; }
</style>
</head>
<body>

<div class="card">
<h2>Zuständigkeitsfinder</h2>

<select id="autobahn" onchange="zeigeListe(); updateRichtung(); berechnen();">
    <option value="A1">A1</option>
    <option value="A3">A3</option>
    <option value="A44">A44</option>
    <option value="A46">A46</option>
    <option value="A57">A57</option>
    <option value="A59">A59</option>
    <option value="A535">A535</option>
    <option value="A542">A542</option>
</select>

<input id="km" placeholder="Kilometer (z.B. 378,500)" oninput="berechnen()">

<button id="gpsBtn" onclick="toggleGPS()">📡 GPS Live-Erfassung starten</button>
<div id="gps-info">Lade NRW Geodaten... Bitte warten.</div>

<button onclick="berechnen()">Manuell Berechnen</button>

<div class="result">
    <p><strong>Bereich:</strong> <span id="b"></span></p>
    <p><strong>Gemeinde:</strong> <span id="g"></span></p>
    <p><strong>Meisterei:</strong> <span id="m"></span></p>
    <p><strong>Adresse:</strong> <span id="m_address"></span></p>
    <div class="bar"><div id="progress" class="fill"></div></div>
</div>

<table>
    <thead><tr><th>Typ</th><th>Name</th><th>Km</th></tr></thead>
    <tbody id="liste"></tbody>
</table>
</div>

<div class="card">
<h2>Weg-Zeit Rechner</h2>
<input id="start_km" placeholder="Start km">
<input id="speed" placeholder="km/h">
<select id="richtung"></select>
<input id="zeit" placeholder="Zeit (h)">
<button onclick="berechneWeg()">Berechnen</button>

<div class="result">
    <p><strong>Ziel km:</strong> <span id="ziel_km"></span></p>
    <p><strong>Nächste AS:</strong> <span id="next_as"></span></p>
</div>
</div>

<script>
// --- 1. DATEN (Dein Originalstand) ---
const grenzen={A1:[363.315,381.646],A3:[101.2,122.819],A44:[1.215,17.599],A46:[70.815,114.763],A57:[88.5,100.912],A59:[0.578,14.467],A535:[0.262,12.811],A542:[4.055,8.754]};

const listen={
A1:[["AS","W.-Langerfeld","365,700"],["PP","Kucksiepen","367,900"],["PP","Ehrenberg","368,200"],["AS","W.-Ronsdorf","373,300"],["AS","RS-Lennep","376,800"],["AS","Remscheid","379,100"]],
A3:[["PP","Stindertal","103,400"],["PP","Stinderhof","103,400"],["AK","Hilden","108,700"],["Sonst","Heidi","113,100"],["AS","Solingen","117,400"],["AK","Langenfeld","118,400"],["PP","Reusrather Heide","121,600"]],
A44:[["AS","Heiligenhaus","1,200"],["AS","Hetterscheidt","6,000"],["Tunnel","Birth","7,090-7,930"],["AS","Velbert-Nord","8,400"],["AD","Velbert-Nord","9,500"],["AS","Langenberg","11,900"],["AS","E.-Kupferd.-Dilldorf","14,100"],["SA","E.-Kupferdreh","14,700"],["AS","E.-Überruhr","16,800"],["AS","E.-Heisingen","17,600"]],
A46:[["AK","Neuss-Süd","70,800"],["AS","NE-Uedesheim","72,300"],["AS","D.-Bilk","76,300"],["Tunnel","Universität","76,136-77,170"],["AS","D.-Wersten","78,200"],["Tunnel","Wersten","78,140-79,010"],["AS","D.-Holthausen","80,000"],["AS","D.-Eller","81,200"],["AK","Düsseldorf-Süd","82,000"],["AS","Erkrath","85,000"],["AK","Hilden","87,000"],["AS","Hilden","87,400"],["AS","Haan-West","89,400"],["PP","Höfgen","92,600"],["PP","Stropmütze","92,600"],["AS","Haan-Ost","94,200"],["AS","W.-Cronenberg","98,400"],["Kreuz","Sonnborner","99,500"],["AS","W.-Varresbeck","101,600"],["AS","W.-Katernberg","103,900"],["AS","W.-Elberfeld","105,700"],["AS","W.-Barmen","107,800"],["AS","W.-Wichlinghausen","110,000"],["Kreuz","Sternenberg","110,900"],["AS","W.-Oberbarmen","113,900"]],
A57:[["AK","Neuss-Süd","90,300"],["TuR","Nievenheim","94,900"],["AS","Dormagen","99,400"]],
A59:[["AK","Düsseldorf Süd","0,578"],["AS","D.-Benrath","1,800"],["AS","D.-Garath","4,600"],["PP","Wolfhagen","8,000"],["AS","Richrath","9,000"],["PP","Berghausen","9,900"],["AS","Monheim","11,400"],["AK","Monheim-Süd","13,100"]],
A535:[["AD","Velbert-Nord","0,262"],["AS","Velbert","1,800"],["AS","Tönnisheide","4,500"],["AS","Wülfrath","6,600"],["Tunnel","Großer Busch","11,030-11,300"],["AS","W.-Dornap","11,700"]],
A542:[["AD","Monheim-Süd","4,055"],["AS","Reusrath","5,700"],["AS","Immigrath","8,000"],["AD","Langenfeld","8,754"]]
};

// --- Deine Gemeinden, Richtungen und Meistereien (Hier unverändert lassen) ---
const gemeinden={ A1:[{from:363.315,to:365.711,name:"Schwelm"},{from:365.711,to:373.815,name:"Wuppertal"},{from:373.815,to:381.646,name:"Remscheid"}], A3:[{from:101.2,to:102.996,name:"Düsseldorf"},{from:102.996,to:108.347,name:"Erkrath"},{from:108.347,to:112.770,name:"Hilden"},{from:112.770,to:114.266,name:"Solingen"},{from:114.264,to:122.819,name:"Langenfeld"}], A44:[{from:1.215,to:4.096,name:"Heiligenhaus"},{from:4.096,to:4.907,name:"Wülfrath"},{from:4.907,to:5.466,name:"Velbert"},{from:5.466,to:5.607,name:"Heiligenhaus"},{from:5.607,to:12.754,name:"Velbert"},{from:12.754,to:17.599,name:"Essen"}], A46:[{from:70.815,to:74.919,name:"Neuss"},{from:74.919,to:85.416,name:"Düsseldorf"},{from:85.416,to:94.706,name:"Haan"},{from:94.706,to:114.763,name:"Wuppertal"}], A57:[{from:88.5,to:91.6,name:"Neuss"},{from:91.6,to:100.912,name:"Dormagen"}], A59:[{from:0.578,to:7.714,name:"Düsseldorf"},{from:7.714,to:14.467,name:"Langenfeld"}], A535:[{from:0.262,to:7.128,name:"Velbert"},{from:7.128,to:9.326,name:"Wülfrath"},{from:9.326,to:12.811,name:"Wuppertal"}], A542:[{from:4.055,to:8.754,name:"Langenfeld"}] };
const richtungen={ A1:["RF Köln (+)","RF Dortmund (-)"], A3:["RF Köln (+)","RF Arnheim (-)"], A44:["RF Kassel (+)","RF Aachen (-)"], A46:["RF Brilon (+)","RF Heinsberg (-)"], A57:["RF Köln (+)","RF Nijmegen (-)"], A59:["RF Köln (+)","RF Dinslaken (-)"], A535:["RF Wuppertal (+)","RF Velbert (-)"], A542:["RF Langenfeld (+)","RF Monheim (-)"] };
const meistereien={ A1:[{from:363.315,to:365.649,name:"AM Hagen",address:"In d. Krone 20, 58099 Hagen"},{from:365.649,to:381.646,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}], A3:[{from:101.2,to:107.925,name:"AM Ratingen",address:"Brachter Str. 45A, 40882 Ratingen"},{from:107.925,to:122.819,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}], A44:[{from:1.215,to:17.599,name:"AM Ratingen",address:"Brachter Str. 45A, 40882 Ratingen"}], A46:[{from:70.815,to:80.770,name:"AM Kaarst",address:"Neersener Str. 9, 41564 Kaarst"},{from:80.770,to:88.340,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"},{from:88.340,to:114.763,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}], A57:[{from:88.5,to:93.343,name:"AM Kaarst",address:"Neersener Str. 9, 41564 Kaarst"},{from:93.343,to:100.912,name:"AM Köln",address:"Dürener Str. 462, 50858 Köln"}], A59:[{from:0.578,to:14.467,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}], A535:[{from:0.262,to:12.811,name:"AM Remscheid",address:"Talsperre 23, 42859 Remscheid"}], A542:[{from:4.055,to:8.754,name:"AM Leverkusen",address:"Bonner Str. 71, 51379 Leverkusen"}] };

// --- 2. GPS & DATEI LOGIK ---
let datenLand = [], datenBAB = [], referenzPunkte = [];
let datenGeladen = false;
let watchId = null;

Promise.all([
    fetch('Abschnitt.json').then(res => res.json()),
    fetch('AbschnittBAB.json').then(res => res.json()),
    fetch('BABKM.json').then(res => res.json()) // Angepasst auf .json
]).then(([land, bab, punkte]) => {
    datenLand = extrahiere(land, true);
    datenBAB = extrahiere(bab, true);
    referenzPunkte = extrahiere(punkte, false);
    datenGeladen = true;
    document.getElementById("gps-info").innerHTML = '<span style="color:green; font-weight:bold;">✅ Geo-Datenbank geladen. GPS bereit.</span>';
}).catch(err => {
    document.getElementById("gps-info").innerHTML = '<span style="color:red; font-weight:bold;">❌ Fehler beim Laden der Dateien (Abschnitt.json, AbschnittBAB.json oder BABKM.json)</span>';
});

function extrahiere(json, erwarteLinien) {
    let list = [];
    if (!json || !json.features) return list;
    json.features.forEach(f => {
        try { 
            turf.flatten(f).features.forEach(sub => {
                if (erwarteLinien && (!sub.geometry || !sub.geometry.type.includes('LineString'))) return;
                list.push(sub);
            }); 
        } catch(e){}
    });
    return list;
}

function toggleGPS() {
    const btn = document.getElementById("gpsBtn");
    const info = document.getElementById("gps-info");
    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        btn.innerHTML = "📡 GPS Live-Erfassung starten";
        btn.classList.remove("active");
        info.innerHTML = "GPS pausiert.";
    } else {
        if (!navigator.geolocation) return info.innerText = "Browser unterstützt kein GPS";
        btn.innerHTML = "⏹️ GPS stoppen";
        btn.classList.add("active");
        info.innerHTML = "⏳ Suche Satelliten...";
        watchId = navigator.geolocation.watchPosition(pos => {
            try { verarbeiteGPS(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy); }
            catch (e) { info.innerHTML = "❌ Fehler: " + e.message; }
        }, err => { info.innerHTML = "❌ GPS-Fehler: " + err.message; }, { enableHighAccuracy: true, maximumAge: 0 });
    }
}

function verarbeiteGPS(lat, lon, acc) {
    const pt = turf.point([lon, lat]);
    let nBAB = findeNaechsteLinie(datenBAB, pt);
    let nLand = findeNaechsteLinie(datenLand, pt);
    let sel = (nBAB && nBAB.dist <= 0.15) ? nBAB : nLand;

    if (sel) {
        const props = sel.feature.properties || {};
        const strName = ((props.STRKL || "") + (props.STRNR || "")).toUpperCase().replace(/\s/g,'');
        let bkm = berechneGoldgriffBKM(pt, strName);
        
        document.getElementById("km").value = bkm.toFixed(3).replace('.', ',');
        const dropdown = document.getElementById("autobahn");
        if (Array.from(dropdown.options).some(o => o.value === strName)) {
            dropdown.value = strName;
            document.getElementById("gps-info").innerHTML = `<span style="color:green;font-weight:bold;">✅ ${strName} erkannt</span> | BKM: ${bkm.toFixed(3)} | Gen.: ±${acc.toFixed(0)}m`;
        }
        zeigeListe(); updateRichtung(); berechnen();
    }
}

function berechneGoldgriffBKM(meinPunkt, strName) {
    let suchName = strName.replace(/\s/g,'').replace('A',''); 
    let passendePunkte = referenzPunkte.filter(f => {
        if (!f.properties || !f.properties.Bez) return false;
        return String(f.properties.Bez).toUpperCase().replace(/\s/g,'').replace('A','') === suchName;
    });

    if (passendePunkte.length > 0) {
        let ptsColl = turf.featureCollection(passendePunkte);
        let closest = turf.nearestPoint(meinPunkt, ptsColl);
        let refKM = parseFloat(String(closest.properties.Kilometer).replace(',', '.'));
        let dist = turf.distance(meinPunkt, closest); 
        
        // Da wir nun saubere WGS84 Daten haben, stimmt diese Berechnung auf den Meter genau!
        return refKM + dist;
    }
    return 0; 
}

function findeNaechsteLinie(liste, pt) {
    let min = Infinity; let found = null;
    liste.forEach(f => {
        try {
            let d = turf.pointToLineDistance(pt, f);
            if (d < min) { min = d; found = f; }
        } catch(e) {}
    });
    return found ? { feature: found, dist: min } : null;
}

// --- 3. UI FUNKTIONEN (Originale von dir) ---
function zeigeListe(){
    let a=document.getElementById("autobahn").value;
    let tbody=document.getElementById("liste");
    tbody.innerHTML="";
    if(!grenzen[a]) return;
    document.getElementById("b").innerText=grenzen[a][0].toFixed(3).replace('.',',')+" - "+grenzen[a][1].toFixed(3).replace('.',',');
    if(listen[a]) listen[a].forEach(e=>{
        let tr=document.createElement("tr");
        tr.innerHTML=`<td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td>`;
        tbody.appendChild(tr);
    });
    updateZuständigkeit();
}
function updateZuständigkeit() {
    let a=document.getElementById("autobahn").value;
    let km=parseFloat(document.getElementById("km").value.replace(',','.'));
    let gemeinde="-", meister="-", addr="-";
    if(!isNaN(km) && gemeinden[a] && meistereien[a]){
        gemeinden[a].forEach(gf=>{if(km>=gf.from && km<=gf.to) gemeinde=gf.name;});
        meistereien[a].forEach(mf=>{if(km>=mf.from && km<=mf.to){meister=mf.name; addr=mf.address;}});
    }
    document.getElementById("g").innerText=gemeinde;
    document.getElementById("m").innerText=meister;
    document.getElementById("m_address").innerText=addr;
}
function updateRichtung(){
    let a=document.getElementById("autobahn").value;
    let sel=document.getElementById("richtung"); sel.innerHTML="";
    if(!richtungen[a]) return;
    richtungen[a].forEach(r=>{ let opt=document.createElement("option"); opt.value=r; opt.textContent=r; sel.appendChild(opt); });
}
function berechnen(){
    updateZuständigkeit();
    let km=parseFloat(document.getElementById("km").value.replace(',','.'));
    if(isNaN(km)) return;
    let a=document.getElementById("autobahn").value;
    if(!grenzen[a]) return;
    let percent=((km-grenzen[a][0])/(grenzen[a][1]-grenzen[a][0]))*100;
    document.getElementById("progress").style.width=Math.max(0,Math.min(100,percent))+"%";
}
function berechneWeg(){
    let km=parseFloat(document.getElementById("start_km").value.replace(',','.'));
    let speed=parseFloat(document.getElementById("speed").value);
    let time=parseFloat(document.getElementById("zeit").value);
    let dir=document.getElementById("richtung").value;
    let a=document.getElementById("autobahn").value;
    if(isNaN(km)||isNaN(speed)||isNaN(time)||!listen[a])return;
    let ziel=dir.includes("(+)")?km+(speed*time):km-(speed*time);
    let next="-", bestDiff=Infinity;
    listen[a].forEach(e=>{
        if(e[0]!="AS") return;
        let val=parseFloat(e[2].replace(',','.'));
        if(dir.includes("(+)") && val>=ziel){ if(val-ziel<bestDiff){bestDiff=val-ziel; next=e[1];}}
        if(dir.includes("(-)") && val<=ziel){ if(ziel-val<bestDiff){bestDiff=ziel-val; next=e[1];}}
    });
    document.getElementById("ziel_km").innerText=ziel.toFixed(3).replace('.',',');
    document.getElementById("next_as").innerText=next;
}
zeigeListe(); updateRichtung();
</script>
</body>
</html>
