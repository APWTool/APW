<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKM Finder ALPHA</title>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<style>
    body{font-family:Arial,sans-serif;margin:20px;background:#f4f6f8;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    .card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);max-width:500px;width:100%}
    h2{text-align:center;margin-top:0;color:#333}
    select,input,button{width:100%;margin-top:10px;padding:12px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;font-size:1em}
    button{background:#007BFF;color:white;border:none;cursor:pointer;font-weight:bold}
    button:hover{background:#0056b3}
    table{width:100%;margin-top:20px;border-collapse:collapse;font-size:0.85em}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    .bar{margin-top:15px;height:18px;background:#ddd;border-radius:9px;overflow:hidden}
    .fill{height:100%;background:#28a745;width:0%;transition:width 0.3s}
    .result{margin-top:10px;padding:15px;background:#f0f4f8;border-radius:8px;border-left:5px solid #007BFF}
    #gps-info {font-size: 0.9em; line-height:1.4; margin-top: 10px; padding:12px; background:#fff; border:1px solid #ddd; border-radius:6px}
    .status-ok {color: #28a745; font-weight:bold; display:block; margin-bottom:5px}
    .status-warn {color: #856404; font-weight:bold}
</style>
</head>
<body>

<div class="card">
    <h2>Zuständigkeit & BKM</h2>
    
    <select id="autobahn" onchange="zeigeListe(); updateZuständigkeit();">
        <option value="">-- Autobahn wählen --</option>
        <option value="A1">A1</option><option value="A3">A3</option>
        <option value="A44">A44</option><option value="A46">A46</option>
        <option value="A57">A57</option><option value="A59">A59</option>
        <option value="A535">A535</option><option value="A542">A542</option>
    </select>

    <input id="km" placeholder="Kilometer (z.B. 102,5)" oninput="updateZuständigkeit()">
    <button onclick="starteGPS()" id="gps-btn">📡 GPS Live-Erfassung</button>
    <div id="gps-info">Lade Kartendaten...</div>
    
    <div class="result">
        <p><strong>Bereich:</strong> <span id="b">-</span></p>
        <p><strong>Gemeinde:</strong> <span id="g">-</span></p>
        <p><strong>Meisterei:</strong> <span id="m">-</span></p>
        <div class="bar"><div id="progress" class="fill"></div></div>
    </div>

    <table>
        <thead><tr><th>Typ</th><th>Name</th><th>Km</th></tr></thead>
        <tbody id="liste"></tbody>
    </table>
</div>

<script>
// DATENLISTEN (UNVERÄNDERT)
const grenzen={A1:[363.315,381.658],A3:[101.2,122.819],A44:[1.215,17.599],A46:[70.815,114.763],A57:[88.5,100.912],A59:[0.578,14.467],A535:[0.262,12.811],A542:[4.055,8.754]};
const listen={
    A1:[["AS","W.-Langerfeld","365,700"],["PP","Kucksiepen","367,900"],["PP","Ehrenberg","368,200"],["AS","W.-Ronsdorf","373,300"],["AS","RS-Lennep","376,800"],["AS","Remscheid","379,100"]],
    A3:[["PP","Stindertal","103,400"],["PP","Stinderhof","103,400"],["AK","Hilden","108,700"],["TuR","Heidi","113,100"],["AS","Solingen","117,400"],["AK","Langenfeld","118,400"],["PP","Reusrather Heide","121,600"]],
    A44:[["AS","Heiligenhaus","1,200"],["AS","Hetterscheidt","6,000"],["AS","Velbert-Nord","8,400"],["AS","Langenberg","11,900"],["AS","E.-Kupferd.-Dilldorf","14,100"],["AS","E.-Überruhr","16,800"]],
    A46:[["AK","Neuss-Süd","70,800"],["AS","NE-Uedesheim","72,300"],["AS","D.-Bilk","76,300"],["AS","D.-Wersten","78,200"],["AS","D.-Holthausen","80,000"],["AS","D.-Eller","81,200"],["AK","Düsseldorf-Süd","82,000"],["AS","Erkrath","85,000"],["AK","Hilden","87,000"],["AS","Hilden","87,400"],["AS","Haan-West","89,400"],["AS","Haan-Ost","94,200"],["AS","W.-Cronenberg","98,400"],["Kreuz","Sonnborn","99,500"],["AS","W.-Varresbeck","101,600"],["AS","W.-Katernberg","103,900"],["AS","W.-Elberfeld","105,700"],["AS","W.-Barmen","107,800"],["AS","W.-Wichlinghausen","110,000"],["AS","W.-Oberbarmen","113,900"]],
    A57:[["AK","Neuss-Süd","90,300"],["AS","Dormagen","99,400"]],
    A59:[["AK","Düsseldorf Süd","0,578"],["AS","D.-Benrath","1,800"],["AS","D.-Garath","4,600"],["AS","Richrath","9,000"],["AS","Monheim","11,400"],["AK","Monheim-Süd","13,100"]],
    A535:[["AD","Velbert-Nord","0,262"],["AS","Velbert","1,800"],["AS","Tönnisheide","4,500"],["AS","Wülfrath","6,600"],["AS","W.-Dornap","11,700"]],
    A542:[["AD","Monheim-Süd","4,055"],["AS","Reusrath","5,700"],["AS","Immigrath","8,000"],["AD","Langenfeld","8,754"]]
};
const gemeinden={
    A1:[{from:363.315,to:365.711,name:"Schwelm"},{from:365.711,to:373.815,name:"Wuppertal"},{from:373.815,to:381.646,name:"Remscheid"}],
    A3:[{from:101.2,to:102.996,name:"Düsseldorf"},{from:102.996,to:108.347,name:"Erkrath"},{from:108.347,to:112.770,name:"Hilden"},{from:114.264,to:122.819,name:"Langenfeld"}],
    A46:[{from:70.815,to:74.919,name:"Neuss"},{from:74.919,to:85.416,name:"Düsseldorf"},{from:85.416,to:94.706,name:"Haan"},{from:94.706,to:114.763,name:"Wuppertal"}]
};
const meistereien={
    A46:[{from:70.815,to:80.770,name:"AM Kaarst"},{from:80.770,to:88.340,name:"AM Leverkusen"},{from:88.340,to:114.763,name:"AM Remscheid"}]
};

// Globale Variablen für getrennte Datennetze
let datenA = { type: "FeatureCollection", features: [] };
let datenB = { type: "FeatureCollection", features: [] };
let datenL = { type: "FeatureCollection", features: [] };
let datenGeladen = false;
let gpsWatchId = null;

// LADEPROZESS JSONS & DIREKTE TRENNUNG
Promise.all([
    fetch('Abschnitt.json').then(res => res.json()),
    fetch('AbschnittBAB.json').then(res => res.json())
]).then(([dataLand, dataBAB]) => {
    let alleFeatures = [...dataLand.features, ...dataBAB.features];
    
    // Sortiere direkt beim Laden nach Klasse
    alleFeatures.forEach(f => {
        let kl = String(f.properties?.STRKL || "").trim().toUpperCase();
        if (kl === "A") datenA.features.push(f);
        else if (kl === "B") datenB.features.push(f);
        else datenL.features.push(f);
    });
    
    datenGeladen = true;
    document.getElementById("gps-info").innerText = "Bereit (Alle Netze geladen & sortiert).";
}).catch(err => {
    document.getElementById("gps-info").innerText = "Fehler: Kartendaten konnten nicht geladen werden!";
    console.error(err);
});

function starteGPS() {
    const btn = document.getElementById("gps-btn");
    if (gpsWatchId) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
        btn.innerText = "📡 GPS Live-Erfassung starten";
        btn.style.background = "#007BFF";
        return;
    }
    btn.innerText = "⏹️ GPS stoppen";
    btn.style.background = "#dc3545";
    gpsWatchId = navigator.geolocation.watchPosition(pos => {
        berechneBKM(pos.coords.latitude, pos.coords.longitude);
    }, null, { enableHighAccuracy: true });
}

function berechneBKM(lat, lon) {
    if (!datenGeladen) return;
    try {
        const pt = turf.point([lon, lat]);
        
        // Berechne die Distanz zu allen drei Netzen getrennt
        let nearA = datenA.features.length ? turf.nearestPointOnLine(datenA, pt, {units: 'kilometers'}) : null;
        let nearB = datenB.features.length ? turf.nearestPointOnLine(datenB, pt, {units: 'kilometers'}) : null;
        let nearL = datenL.features.length ? turf.nearestPointOnLine(datenL, pt, {units: 'kilometers'}) : null;

        let distA = nearA ? nearA.properties.dist : Infinity;
        let distB = nearB ? nearB.properties.dist : Infinity;
        let distL = nearL ? nearL.properties.dist : Infinity;

        let gewaehltesFeature = null;
        let featProps = null;

        // PRIORITÄTS-LOGIK (Direkter Distanzvergleich statt Box-Puffer)
        if (distA <= 0.5) { 
            // Autobahn gewinnt immer, wenn unter 500m entfernt
            gewaehltesFeature = nearA;
            featProps = datenA.features[gewaehltesFeature.properties.index].properties;
        } 
        else if (distB <= 0.25) { 
            // Danach Bundesstraße, wenn unter 250m entfernt
            gewaehltesFeature = nearB;
            featProps = datenB.features[gewaehltesFeature.properties.index].properties;
        } 
        else { 
            // Fallback auf die absolut nächste Straße (meist L)
            let minDist = Math.min(distA, distB, distL);
            if (minDist === distA) { gewaehltesFeature = nearA; featProps = datenA.features[gewaehltesFeature.properties.index].properties; }
            else if (minDist === distB) { gewaehltesFeature = nearB; featProps = datenB.features[gewaehltesFeature.properties.index].properties; }
            else if (minDist === distL) { gewaehltesFeature = nearL; featProps = datenL.features[gewaehltesFeature.properties.index].properties; }
        }

        if(!gewaehltesFeature) return;

        const strKl = String(featProps.STRKL || "").trim();
        const strNr = String(featProps.STRNR || "").trim();
        const strName = strKl + strNr;
        const dist = Math.round(gewaehltesFeature.properties.dist * 1000);

        const statAnf = parseFloat(featProps.STATANF) || 0;
        const meter = (gewaehltesFeature.properties.location || 0) * 1000;
        const bkm = (statAnf + meter) / 1000;

        document.getElementById("km").value = bkm.toFixed(3).replace('.', ',');
        const select = document.getElementById("autobahn");
        const inDb = Array.from(select.options).some(o => o.value === strName);

        if (inDb) {
            select.value = strName;
            zeigeListe();
            updateZuständigkeit();
            document.getElementById("gps-info").innerHTML = `<span class="status-ok">✅ ${strName} erkannt</span>BKM: ${bkm.toFixed(3)} | Abweichung: ${dist}m`;
        } else {
            document.getElementById("gps-info").innerHTML = `<span class="status-warn">ℹ️ ${strName} außerhalb Fokus-Liste</span><br>BKM: ${bkm.toFixed(3)} | Abweichung: ${dist}m`;
            resetDetails();
        }
    } catch (e) { console.error(e); }
}

function zeigeListe() {
    let a = document.getElementById("autobahn").value;
    let tbody = document.getElementById("liste");
    tbody.innerHTML = "";
    if(!grenzen[a]) return;
    document.getElementById("b").innerText = grenzen[a][0].toFixed(3).replace('.',',') + " - " + grenzen[a][1].toFixed(3).replace('.',',');
    if(listen[a]) {
        listen[a].forEach(e => {
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td>`;
            tbody.appendChild(tr);
        });
    }
}

function updateZuständigkeit() {
    let a = document.getElementById("autobahn").value;
    let val = document.getElementById("km").value.replace(',','.');
    let km = parseFloat(val);
    if(isNaN(km) || !grenzen[a]) return;
    
    let gName = "-", mName = "-";
    if(gemeinden[a]) gemeinden[a].forEach(g => { if(km>=g.from && km<=g.to) gName=g.name; });
    if(meistereien[a]) meistereien[a].forEach(m => { if(km>=m.from && km<=m.to) mName=m.name; });
    
    document.getElementById("g").innerText = gName;
    document.getElementById("m").innerText = mName;
    
    let perc = ((km - grenzen[a][0]) / (grenzen[a][1] - grenzen[a][0])) * 100;
    document.getElementById("progress").style.width = Math.max(0, Math.min(100, perc)) + "%";
}

function resetDetails() {
    document.getElementById("g").innerText = "-";
    document.getElementById("m").innerText = "-";
    document.getElementById("b").innerText = "-";
    document.getElementById("progress").style.width = "0%";
    document.getElementById("liste").innerHTML = "";
}

zeigeListe();
</script>
</body>
</html>
