<!DOCTYPE html>
<html>
<head>
    <title>BKM Tracker - NWSIB Integration</title>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #ausgabe { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 10px; line-height: 1.6; }
        .bkm-wert { font-size: 1.5em; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>
    <h1>Mein Autobahn-Tool (Live BKM)</h1>
    <div id="ausgabe">Warte auf GPS und Daten...</div>

    <script>
        let strassenDaten = null;

        // 1. Deine konvertierte Datei laden (Abschnitt.json)
        fetch('Abschnitt.json')
            .then(response => response.json())
            .then(data => {
                strassenDaten = data;
                console.log("NWSIB Daten erfolgreich geladen!");
                starteGPS(); 
            })
            .catch(err => {
                document.getElementById('ausgabe').innerHTML = "Fehler beim Laden der Abschnitt.json!";
                console.error(err);
            });

        function starteGPS() {
            if (navigator.geolocation) {
                // watchPosition sorgt für kontinuierliche Updates während der Fahrt
                navigator.geolocation.watchPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    berechneBKM(lat, lon);
                }, error => {
                    console.error("GPS Fehler:", error);
                }, {
                    enableHighAccuracy: true // Wichtig für Autobahngeschwindigkeiten
                });
            }
        }

function berechneBKM(lat, lon) {
    if (!strassenDaten || !strassenDaten.features) {
        console.error("Datenstruktur ungültig!");
        return;
    }

    const aktuellerPunkt = turf.point([lon, lat]);
    
    // Nächstes Liniensegment finden
    const snapped = turf.nearestPointOnLine(strassenDaten, aktuellerPunkt);
    const p = snapped.properties; // Abkürzung für Properties
    
    // DEBUG: Schau in die Browser-Konsole (F12), um zu sehen, was wirklich ankommt!
    console.log("Gefundene Attribute:", p);

    // Wir suchen die Spalten, egal ob sie STATANF, statanf oder StatAnf heißen
    const getProp = (names) => {
        const found = names.find(name => name in p);
        return found ? p[found] : null;
    };

    // Mapping der Spaltennamen (alle Varianten abdecken)
    const strKl = getProp(['STRKL', 'strkl', 'STR_KLAS']) || "";
    const strNr = getProp(['STRNR', 'strnr', 'STR_NR']) || "";
    const absNr = getProp(['ABSNR', 'absnr', 'ABS_NR']) || "Unbekannt";
    const strBez = getProp(['STRBEZ', 'strbez']) || "-";
    const statAnf = parseFloat(getProp(['STATANF', 'statanf', 'STAT_VON'])) || 0;

    // BKM Berechnung (Turf liefert location in KM)
    const meterAufAbschnitt = snapped.properties.location * 1000;
    const gesamtMeter = statAnf + meterAufAbschnitt;
    const aktuellerBKM = (gesamtMeter / 1000).toFixed(3);

    // In HTML anzeigen
    document.getElementById('ausgabe').innerHTML = `
        <strong>Straße:</strong> ${strKl}${strNr} (Abschnitt: ${absNr})<br>
        <strong>Bezeichnung:</strong> ${strBez}<br>
        <strong>Aktueller Standort:</strong><br>
        <span class="bkm-wert">KM ${aktuellerBKM.replace('.', ',')}</span>
    `;
}
    </script>
</body>
</html>
