<!DOCTYPE html>
<html>
<head>
    <title>BKM Tracker - NWSIB Integration</title>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #ausgabe { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 10px; line-height: 1.6; }
        .bkm-wert { font-size: 1.5em; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>
    <h1>Mein Autobahn-Tool (Live BKM)</h1>
    <div id="ausgabe">Warte auf GPS und Daten...</div>

    <script>
        let strassenDaten = null;

        // 1. Deine konvertierte Datei laden (Abschnitt.json)
        fetch('Abschnitt.json')
            .then(response => response.json())
            .then(data => {
                strassenDaten = data;
                console.log("NWSIB Daten erfolgreich geladen!");
                starteGPS(); 
            })
            .catch(err => {
                document.getElementById('ausgabe').innerHTML = "Fehler beim Laden der Abschnitt.json!";
                console.error(err);
            });

        function starteGPS() {
            if (navigator.geolocation) {
                // watchPosition sorgt für kontinuierliche Updates während der Fahrt
                navigator.geolocation.watchPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    berechneBKM(lat, lon);
                }, error => {
                    console.error("GPS Fehler:", error);
                }, {
                    enableHighAccuracy: false // Wichtig für Autobahngeschwindigkeiten // SPÄTER AUF TRUE SETZEN 
                });
            }
        }

function berechneBKM(lat, lon) {
    if (!strassenDaten) return;

    try {
        const aktuellerPunkt = turf.point([lon, lat]);
        
        // 1. Nächstes Segment finden
        const snapped = turf.nearestPointOnLine(strassenDaten, aktuellerPunkt);
        const p = snapped.properties;

        // Konsolen-Check (Sollte jetzt die Attribute zeigen!)
        console.log("Gefundene Attribute:", p);

        // 2. Werte sicher auslesen (Großschreibung beachten!)
        const strKl = p.STRKL || "";
        const strNr = p.STRNR || "";
        const absNr = p.ABSNR || "Unbekannt";
        const strBez = p.STRBEZ || "-";
        
        // STATANF ist laut info eine Zahl, wir gehen von METERN aus
        const statAnf = parseFloat(p.STATANF) || 0;

        // 3. Distanz berechnen
        // Turf gibt location in der Einheit der Quelldaten zurück.
        // Da die NWSIB-Daten in Metern vorliegen (siehe info: LAENGE 27),
        // ist p.location hier wahrscheinlich auch in Metern.
        const meterAufAbschnitt = p.location; 
        
        const gesamtMeter = statAnf + meterAufAbschnitt;
        const aktuellerBKM = (gesamtMeter / 1000).toFixed(3);

        // 4. Anzeige im HTML
        document.getElementById('ausgabe').innerHTML = `
            <div style="border-left: 5px solid #0056b3; padding-left: 15px;">
                <strong>Straße:</strong> ${strKl}${strNr} (Abschnitt: ${absNr})<br>
                <strong>Bezeichnung:</strong> ${strBez}<br>
                <hr>
                <span style="font-size: 1.2em;">Aktueller Standort:</span><br>
                <span style="font-size: 2em; font-weight: bold; color: #0056b3;">
                    KM ${aktuellerBKM.replace('.', ',')}
                </span>
            </div>
        `;
    } catch (e) {
        console.error("Berechnungsfehler:", e);
    }
}

// GPS Funktion mit Fehler-Handling für PC-Tests
function starteGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(position => {
            berechneBKM(position.coords.latitude, position.coords.longitude);
        }, error => {
            if(error.code === 2) {
                document.getElementById('ausgabe').innerHTML = 
                    "<strong>Hinweis:</strong> Kein GPS-Signal. <br>Nutze die 'Sensors' Simulation im Browser (F12) für den Test am PC.";
            }
            console.warn("GPS Fehler Code:", error.code);
        }, {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        });
    }
}
    </script>
</body>
</html>
